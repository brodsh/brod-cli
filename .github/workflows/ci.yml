name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - run: go build ./...
      - run: go vet ./...
      # Default run; the //go:build integration test (needs Docker) is excluded,
      # so this stays fast and self-contained.
      - run: go test ./...
